# HealthMax — nginx Reverse Proxy Configuration
# Place at: /etc/nginx/sites-available/healthmax
# Enable with: sudo ln -s /etc/nginx/sites-available/healthmax /etc/nginx/sites-enabled/healthmax
#
# Collaborator instructions:
#   - Replace 'healthmax.health' with your actual demo domain.
#   - SSL certificate management is handled by AWS ACM via Application Load Balancer,
#     OR use Let's Encrypt (certbot) directly on the EC2 if no ALB is used.
#   - For the hackathon demo, HTTP-only on port 80 is sufficient if HTTPS is managed upstream.

# Upstream FastAPI app
upstream healthmax_backend {
    server 127.0.0.1:8000;
    keepalive 32;
}

# HTTP server — redirects to HTTPS (or serves directly for demo)
server {
    listen 80;
    server_name healthmax.health www.healthmax.health _;

    # For hackathon demo without SSL, remove the redirect block below
    # and serve directly from this block.

    # --- Comment this out if not using HTTPS ---
    # return 301 https://$host$request_uri;

    # --- Serve directly on HTTP (uncomment for demo without HTTPS) ---
    client_max_body_size 20M;   # Allow audio file uploads up to 20MB

    location / {
        proxy_pass         http://healthmax_backend;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        proxy_read_timeout    120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    120s;
    }

    # Serve static frontend files directly from nginx for performance
    location /static/ {
        alias /home/ubuntu/healthmax/frontend/;
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # Health check endpoint — bypass proxy for fast ALB checks
    location /health {
        proxy_pass http://healthmax_backend;
        access_log off;
    }
}

